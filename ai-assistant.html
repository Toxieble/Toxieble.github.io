<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI智能助手 - 聚烯烃产业链含权贸易数字化服务平台</title>
  <script src="https://cdn.jsdelivr.net/npm/vue@3.3.4/dist/vue.global.prod.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <style>
    body {
      font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
      background-color: #f0f4f8;
      min-height: 100vh;
    }
    .navbar-custom {
      background: linear-gradient(135deg, #1a365d 0%, #2c5282 100%);
    }
    .chat-container {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: calc(100vh - 140px);
      padding: 20px;
    }
    .chat-box {
      background: white;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.15);
      max-width: 900px;
      margin: 0 auto;
      overflow: hidden;
    }
    .chat-header {
      background: linear-gradient(135deg, #2c5282 0%, #1a365d 100%);
      color: white;
      padding: 20px;
    }
    .chat-messages {
      height: 500px;
      overflow-y: auto;
      padding: 20px;
      background: #f8fafc;
    }
    .message {
      margin-bottom: 20px;
      display: flex;
    }
    .message.user {
      justify-content: flex-end;
    }
    .message.ai {
      justify-content: flex-start;
    }
    .message-content {
      max-width: 70%;
      padding: 12px 18px;
      border-radius: 20px;
      position: relative;
    }
    .user .message-content {
      background: linear-gradient(135deg, #2c5282 0%, #1a365d 100%);
      color: white;
      border-bottom-right-radius: 5px;
    }
    .ai .message-content {
      background: white;
      color: #333;
      border: 1px solid #e2e8f0;
      border-bottom-left-radius: 5px;
    }
    .message-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 10px;
      flex-shrink: 0;
    }
    .user .message-avatar {
      background: linear-gradient(135deg, #2c5282 0%, #1a365d 100%);
      color: white;
    }
    .ai .message-avatar {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }
    .chat-input-area {
      padding: 20px;
      background: white;
      border-top: 1px solid #e2e8f0;
    }
    .upload-area {
      border: 2px dashed #cbd5e1;
      border-radius: 12px;
      padding: 20px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-bottom: 15px;
    }
    .upload-area:hover, .upload-area.dragover {
      border-color: #2c5282;
      background: #f0f9ff;
    }
    .upload-icon {
      font-size: 36px;
      margin-bottom: 10px;
    }
    .selected-files {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 15px;
    }
    .file-tag {
      background: #e0f2fe;
      padding: 6px 12px;
      border-radius: 20px;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
    }
    .file-tag img {
      width: 20px;
      height: 20px;
      object-fit: cover;
      border-radius: 4px;
    }
    .btn-primary-custom {
      background: linear-gradient(135deg, #2c5282 0%, #1a365d 100%);
      border: none;
      transition: all 0.3s ease;
    }
    .btn-primary-custom:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 20px rgba(44, 82, 130, 0.4);
    }
    .loading-spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 2px solid #fff;
      border-radius: 50%;
      border-top-color: transparent;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .quick-questions {
      background: #f8fafc;
      padding: 15px;
      border-top: 1px solid #e2e8f0;
    }
    .quick-question {
      display: inline-block;
      background: white;
      border: 1px solid #e2e8f0;
      padding: 8px 16px;
      border-radius: 20px;
      margin: 5px;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    .quick-question:hover {
      background: #2c5282;
      color: white;
      border-color: #2c5282;
    }
  </style>
</head>
<body>
  <div id="app">
    <nav class="navbar navbar-expand-lg navbar-custom">
      <div class="container">
        <a class="navbar-brand text-white font-bold" href="index.html">聚烯烃含权贸易平台</a>
        <button class="navbar-toggler bg-white/20" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
          <span class="navbar-toggler-icon text-white"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item"><a class="nav-link text-white" href="index.html">首页</a></li>
            <li class="nav-item"><a class="nav-link text-white" href="index.html#price-query">价格查询</a></li>
            <li class="nav-item"><a class="nav-link text-white active" href="ai-assistant.html">AI助手</a></li>
            <li class="nav-item"><a class="nav-link text-white" href="index.html#business-plan">提交方案</a></li>
            <li class="nav-item"><a class="nav-link text-white" href="business-plans.html">方案管理</a></li>
            <li class="nav-item"><a class="nav-link text-white" href="index.html#about">关于我们</a></li>
          </ul>
        </div>
      </div>
    </nav>

    <div class="chat-container">
      <div class="chat-box">
        <div class="chat-header">
          <div class="d-flex align-items-center gap-3">
            <div class="w-10 h-10 rounded-full bg-white/20 flex items-center justify-center">
              🤖
            </div>
            <div>
              <h4 class="font-bold">AI智能助手</h4>
              <p class="text-sm opacity-80">聚烯烃产业链专业风控顾问</p>
            </div>
          </div>
        </div>

        <div class="chat-messages" ref="chatMessagesRef">
          <div v-for="(msg, index) in chatMessages" :key="index" :class="['message', msg.type]">
            <div class="message-avatar">
              {{ msg.type === 'user' ? '👤' : '🤖' }}
            </div>
            <div class="message-content">
              <p>{{ msg.content }}</p>
              <div v-if="msg.files && msg.files.length > 0" class="mt-2">
                <div v-for="(file, i) in msg.files" :key="i" class="d-flex items-center gap-2 text-xs opacity-70">
                  <img v-if="file.type.startsWith('image/')" :src="file.preview" width="40" height="40" class="rounded">
                  <span>{{ file.name }}</span>
                </div>
              </div>
            </div>
          </div>
        </div>

        <div class="quick-questions">
          <p class="text-sm text-gray-500 mb-2">快速提问：</p>
          <div>
            <span v-for="q in faqQuestions" :key="q" class="quick-question" @click="selectQuestion(q)">
              {{ q }}
            </span>
          </div>
        </div>

        <div class="chat-input-area">
          <input ref="fileInput" type="file" multiple class="d-none" @change="handleFileSelect">
          
          <div @click="triggerFileInput" @dragover.prevent="dragOver" @dragleave="dragLeave" @drop.prevent="dropFile" :class="['upload-area', { 'dragover': isDragging }]">
            <div class="upload-icon">📁</div>
            <div class="font-semibold text-gray-700 mb-2">点击或拖拽文件到此处上传</div>
            <div class="text-sm text-gray-500">支持图片（JPG/PNG/GIF）、文档（PDF/DOC/XLS）等格式</div>
          </div>

          <div v-if="selectedFiles.length > 0" class="selected-files">
            <div v-for="(file, index) in selectedFiles" :key="index" class="file-tag">
              <img v-if="file.type.startsWith('image/')" :src="file.preview" alt="预览">
              <span>{{ file.name }}</span>
              <button @click="removeFile(index)" class="btn btn-sm btn-danger">×</button>
            </div>
          </div>

          <div class="input-group">
            <input v-model="userInput" type="text" class="form-control" placeholder="输入您的问题..." @keyup.enter="sendMessage" :disabled="isChatting">
            <button @click="sendMessage" :disabled="isChatting || (!userInput.trim() && selectedFiles.length === 0)" class="btn btn-primary-custom">
              <span v-if="isChatting" class="loading-spinner me-2"></span>
              {{ isChatting ? '思考中...' : '发送' }}
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const { createApp, ref, nextTick } = Vue
    const API_BASE = '/api'

    createApp({
      setup() {
        const userInput = ref('')
        const chatMessages = ref([{ type: 'ai', content: '您好！我是聚烯烃产业链AI风控助手，请问有什么可以帮助您的？您可以上传文件（图片、文档等），我会帮您分析。' }])
        const isChatting = ref(false)
        const selectedFiles = ref([])
        const isDragging = ref(false)
        const fileInput = ref(null)
        const chatMessagesRef = ref(null)

        const faqQuestions = [
          'PP未来会涨吗？',
          '中小企业怎么融资？',
          '什么时候适合囤货？',
          '含权贸易是什么？',
          '风控评分卡如何使用？',
          'PE价格走势如何？',
          '原油对聚烯烃影响？',
          '什么是锁价策略？'
        ]

        const triggerFileInput = () => {
          fileInput.value.click()
        }

        const handleFileSelect = (event) => {
          const files = Array.from(event.target.files)
          addFiles(files)
          event.target.value = ''
        }

        const dragOver = () => {
          isDragging.value = true
        }

        const dragLeave = () => {
          isDragging.value = false
        }

        const dropFile = (event) => {
          isDragging.value = false
          const files = Array.from(event.dataTransfer.files)
          addFiles(files)
        }

        const addFiles = (files) => {
          files.forEach(file => {
            const reader = new FileReader()
            reader.onload = (e) => {
              selectedFiles.value.push({
                name: file.name,
                type: file.type,
                size: file.size,
                preview: e.target.result
              })
            }
            reader.readAsDataURL(file)
          })
        }

        const removeFile = (index) => {
          selectedFiles.value.splice(index, 1)
        }

        const selectQuestion = (question) => {
          userInput.value = question
        }

        const sendMessage = async () => {
          if (!userInput.value.trim() && selectedFiles.value.length === 0) return
          
          const userMessage = {
            type: 'user',
            content: userInput.value || '[上传了文件]',
            files: selectedFiles.value.length > 0 ? [...selectedFiles.value] : null
          }
          chatMessages.value.push(userMessage)
          
          const question = userInput.value
          userInput.value = ''
          selectedFiles.value = []
          isChatting.value = true

          scrollToBottom()

          try {
            const response = await axios.post(`${API_BASE}/ai/chat`, { question })
            chatMessages.value.push({ type: 'ai', content: response.data.answer })
          } catch (error) {
            console.error('AI对话失败:', error)
            const faqAnswers = {
              'PP未来会涨吗？': '当前PP处于震荡偏强区间，未来7日预计小幅上行，风险中等，建议锁价10%-20%。',
              '中小企业怎么融资？': '平台提供轻量化风控评分卡，无需抵押，以真实贸易数据授信，缓解融资难融资贵。',
              '什么时候适合囤货？': '价格处于低位、AI预警拐点向上、风险等级低时，可适度囤货。',
              '含权贸易是什么？': '结合期权工具的贸易模式，帮助企业锁定成本、对冲价格波动风险。',
              '风控评分卡如何使用？': '输入经营数据、订单稳定性、回款情况等，自动生成信用评分，快速获得融资参考。',
              'PE价格走势如何？': 'PE当前处于震荡偏弱格局，受原油成本支撑有限，短期以观望为主。',
              '原油对聚烯烃影响？': '原油是聚烯烃主要原料，原油价格上涨会推高生产成本，对聚烯烃价格形成支撑。',
              '什么是锁价策略？': '在价格低位时锁定采购成本，通过含权贸易工具规避后续价格上涨风险。'
            }
            const matchedFaq = Object.keys(faqAnswers).find(key => 
              question.includes(key) || key.includes(question)
            )
            const answer = matchedFaq ? faqAnswers[matchedFaq] : '感谢您的提问！我们的专业团队正在处理您的问题，将尽快回复您。'
            chatMessages.value.push({ type: 'ai', content: answer })
          } finally {
            isChatting.value = false
            scrollToBottom()
          }
        }

        const scrollToBottom = () => {
          nextTick(() => {
            if (chatMessagesRef.value) {
              chatMessagesRef.value.scrollTop = chatMessagesRef.value.scrollHeight
            }
          })
        }

        return {
          userInput,
          chatMessages,
          isChatting,
          selectedFiles,
          isDragging,
          fileInput,
          chatMessagesRef,
          faqQuestions,
          triggerFileInput,
          handleFileSelect,
          dragOver,
          dragLeave,
          dropFile,
          removeFile,
          selectQuestion,
          sendMessage
        }
      }
    }).mount('#app')
  </script>
</body>
</html>
